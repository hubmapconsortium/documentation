<!-- 
    Resources for tabbed layout on github's pages markdown
    
    PyMdown Extensions is a collection of extensions for Python Markdown
    https://facelessuser.github.io/pymdown-extensions/extensions/tabbed/

    Ongoing Discussion on Github was closed this nov?
    https://github.com/github/markup/issues/1552

    open still on gitlab
    https://gitlab.com/gitlab-org/gitlab/-/issues/25399




-->



<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">

  <head>
    <meta charset='utf-8'>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,maximum-scale=2">
    <link rel="stylesheet" type="text/css" href="/css/hm.css">
    <link rel="stylesheet" type="text/css" href="/css/hm-code.css">
    <link rel="stylesheet" type="text/css" href="/css/over.css">

    {% seo %}
    <style>
        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
        }

        .tab button {
            background-color: inherit;
            float: left;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: 0.3s;
            font-size: 17px;
        }
        .tabContainer {
            display:inline-block;
            position: relative;
            width: 100%;
            height: 500px;
            background: #435;
        }
        .tabcontent {
            position: absolute;
            top: 0 ;
            left: 0;
            height: 100%;
            width: 100%;
            display:inline-block;
            padding: 6px 12px;
        }
        .tabcontent:nth-child(1) {
            background-color:cadetblue;
        }

        .tabcontent:nth-child(2) {
            background-color:#751486;
        }

        .tabcontent:nth-child(3) {
            background-color:#a7c561;
        }

        .tabcontent:nth-child(4) {
            background-color:#ff2176;
        }


    </style>

    <script>

        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }
        
        function openDefaultTab() {
            document.getElementById("defaultOpen").click();
        }
        document.addEventListener("DOMContentLoaded", function() {
            openDefaultTab();
        });

    </script>
  </head>

  <body>

  <div id="container" class="outer">
    <!-- HEADER -->
    <div id="header_wrap">
      <header class="info-bar">
        <div class="menu-bar"><h1 id="project_title">
<a class="menu-item logo" style="margin-left: 0px;" href="{{ site.baseurl }}/"><img src="https://hubmapconsortium.org/wp-content/uploads/2020/09/hubmap-type-white250.png" id="MenuLogo" alt="HuBMAP logo" height="40"></a>&nbsp;<a class="menu-item" href="/data-submission/">Data Submission</a>&nbsp;&nbsp;<a class="menu-item" href="/assays.html">Assays</a>&nbsp;&nbsp;<a class="menu-item" href= "/apis.html">APIs</a>&nbsp;&nbsp;<a class="menu-item" href= "/sdk/hubmapsdk.html">SDK</a>
        </h1></div>
       </header>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main_content_wrap" style="font-size: 12pt;">

    <div class="tab">
        <button class="tablinks" onclick="openTab(event, 'Home')" id="defaultOpen">Home</button>
        <button class="tablinks" onclick="openTab(event, 'One')">One</button>
        <button class="tablinks" onclick="openTab(event, 'Two')">Two</button>
        <button class="tablinks" onclick="openTab(event, 'Three')">Three</button>
    </div>
    <div class="tabContainer">
        <div id="Home" class="tabcontent">
            <h3>Home</h3>
            <p>Hello World</p>
        </div>
        <div id="One" class="tabcontent">
            <h3>One</h3>
            <p>Goodmorning Jupiter</p>
        </div>
        <div id="Two" class="tabcontent">
            <h3>Two</h3>
            <p>GoodNight Venus</p>
        </div>
        <div id="Three" class="tabcontent">
            <h3>Three</h3>
            <p>Rest well Saturn</p>
        </div>
    </div>

      <section id="main_content" class="inner" style="max-width: 1000px; padding-top: 10px">
        {{ content }}
      </section>
    </div>

    <!-- FOOTER  -->
    <div id="footer_wrap">
      <footer class="info-bar">
        <div class="menu-bar"><div style="float: right;"><p class="copyright"><strong>Copyright © 2024 HuBMAP</p></div></div>
      </footer>
    </div>
  </div>
  </body>
</html>
